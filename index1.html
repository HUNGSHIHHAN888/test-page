<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>給你的一封信</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper: #fdf6e3;
  --paper-shadow: #e8d9b5;
  --ink: #2c2416;
  --ink-light: #5a4a30;
  --bg-dark: #0a0a0f;
  --bg-scene: #1a1a2e;
  --sky-day: #87ceeb;
  --ocean: #1a6b9e;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-dark);
  font-family: 'Noto Serif TC', 'Georgia', serif;
  user-select: none;
}

/* ── SCENES ── */
.scene {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}
.scene.active {
  opacity: 1;
  pointer-events: all;
}

/* ═══════════════════════════
   SCENE 0 — Face ID
═══════════════════════════ */
#scene-faceid {
  background: radial-gradient(ellipse at center, #16213e 0%, #0a0a0f 100%);
  flex-direction: column;
  gap: 2rem;
}

.faceid-ring {
  width: 140px; height: 140px;
  border-radius: 50%;
  border: 2.5px solid #334;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.faceid-ring::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-top-color: #7878cc;
  animation: spin 2s linear infinite;
}
.faceid-icon {
  width: 72px; height: 72px;
}
.faceid-title {
  color: #c8c8e8;
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.05em;
}
.faceid-sub {
  color: #556;
  font-size: 13px;
  margin-top: -1.5rem;
}
#faceid-status {
  font-size: 13px;
  color: #778;
  min-height: 20px;
  transition: color 0.3s;
}
#faceid-status.ok { color: #4caf7d; }
#faceid-status.err { color: #e05c5c; }

.btn-faceid {
  margin-top: 0.5rem;
  padding: 14px 48px;
  border-radius: 50px;
  border: 1px solid #334466;
  background: transparent;
  color: #aab;
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.25s;
  font-family: inherit;
}
.btn-faceid:hover { background: #1a1a3a; border-color: #667; color: #dde; }
.btn-faceid:active { transform: scale(0.97); }

/* ═══════════════════════════
   SCENE 1 — Writing
═══════════════════════════ */
#scene-writing {
  background: #2a1f14;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.desk {
  width: min(500px, 92vw);
  height: min(420px, 80vh);
  background: #3d2b1a;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.desk::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 60px,
    rgba(0,0,0,0.04) 60px,
    rgba(0,0,0,0.04) 61px
  );
}

.paper-sheet {
  width: 72%;
  height: 80%;
  background: var(--paper);
  border-radius: 2px;
  box-shadow: 4px 6px 24px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(0,0,0,0.06);
  position: relative;
  overflow: hidden;
  transform-origin: center center;
}

.paper-lines {
  position: absolute;
  inset: 0;
  padding: 36px 28px 20px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.paper-line {
  height: 1px;
  background: rgba(100,120,200,0.18);
  width: 100%;
}

.writing-canvas {
  position: absolute;
  inset: 0;
}

/* Hand */
.hand-wrap {
  position: absolute;
  bottom: -20px;
  right: -10px;
  width: 120px;
  height: 160px;
  pointer-events: none;
  transform-origin: bottom right;
}

/* ═══════════════════════════
   SCENE 2 — Crumple
═══════════════════════════ */
#scene-crumple {
  background: #2a1f14;
}

.crumple-paper {
  width: 200px; height: 200px;
  position: absolute;
  transform-origin: center;
}

/* ═══════════════════════════
   SCENE 3 — Plane morphing
═══════════════════════════ */
#scene-morph {
  background: #2a1f14;
}

/* ═══════════════════════════
   SCENE 4 — Flight map
═══════════════════════════ */
#scene-flight {
  background: #0d1b2a;
  overflow: hidden;
}

#flight-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.flight-label {
  position: absolute;
  color: rgba(200,220,255,0.7);
  font-size: 11px;
  letter-spacing: 0.08em;
  pointer-events: none;
  text-shadow: 0 0 8px rgba(100,150,255,0.5);
}

/* ═══════════════════════════
   SCENE 5 — Tap hint
═══════════════════════════ */
#scene-tap {
  background: radial-gradient(ellipse at 60% 40%, #1a2a1a, #0a0a0f);
  flex-direction: column;
  gap: 1.5rem;
}

#plane-tap {
  cursor: pointer;
  filter: drop-shadow(0 0 20px rgba(200,200,100,0.4));
  transition: filter 0.3s, transform 0.3s;
  animation: floatPlane 3s ease-in-out infinite;
}
#plane-tap:hover {
  filter: drop-shadow(0 0 32px rgba(200,200,100,0.7));
  transform: scale(1.05);
}

.tap-hint {
  color: rgba(200,200,150,0.8);
  font-size: 15px;
  letter-spacing: 0.15em;
  animation: blink 2s ease-in-out infinite;
}

.location-tag {
  font-size: 12px;
  color: rgba(150,170,200,0.6);
  letter-spacing: 0.1em;
}

/* ═══════════════════════════
   SCENE 6 — Unfold + card
═══════════════════════════ */
#scene-card {
  background: radial-gradient(ellipse at center, #1a1a2e, #0a0a0f);
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
  align-items: center;
  justify-content: flex-start;
  padding: 3rem 1rem;
}

.card-wrap {
  perspective: 1200px;
  width: min(420px, 90vw);
}

.card-inner {
  width: 100%;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(8deg) rotateY(-4deg);
  animation: cardFloat 5s ease-in-out infinite;
}

.card-face {
  background: var(--paper);
  border-radius: 4px;
  padding: 48px 40px 56px;
  box-shadow:
    -8px 12px 40px rgba(0,0,0,0.7),
    inset 0 0 0 1px rgba(0,0,0,0.07),
    0 0 0 1px rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}

.card-face::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #c8a84b, #e8c870, #c8a84b);
}

.card-ruled-lines {
  position: absolute;
  inset: 0;
  padding: 80px 40px 40px;
  display: flex; flex-direction: column; gap: 32px;
  pointer-events: none;
}
.card-ruled-lines span {
  height: 1px;
  background: rgba(100,130,200,0.14);
  display: block;
}

.card-date {
  font-size: 12px;
  color: var(--ink-light);
  opacity: 0.6;
  margin-bottom: 28px;
  letter-spacing: 0.1em;
}

.card-salutation {
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 24px;
  font-weight: 600;
  line-height: 1.4;
}

.card-body {
  font-size: 16px;
  color: var(--ink);
  line-height: 2;
  letter-spacing: 0.04em;
  white-space: pre-line;
}

.card-body p {
  margin-bottom: 1.2em;
}

.card-sign {
  margin-top: 32px;
  font-size: 16px;
  color: var(--ink-light);
  text-align: right;
  font-style: italic;
}

/* card reveal */
.card-wrap.hidden { opacity: 0; transform: scale(0.85) translateY(30px); }
.card-wrap.reveal {
  animation: cardReveal 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
}

/* text typewriter */
.typewriter-text {
  display: inline;
}
.cursor-blink {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: var(--ink);
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
}

/* ═══════════════════════════
   KEYFRAMES
═══════════════════════════ */
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes floatPlane {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-12px) rotate(-3deg); }
}
@keyframes cardFloat {
  0%, 100% { transform: rotateX(8deg) rotateY(-4deg) translateY(0); }
  50% { transform: rotateX(6deg) rotateY(-6deg) translateY(-8px); }
}
@keyframes cardReveal {
  from { opacity: 0; transform: scale(0.85) translateY(30px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes writeStroke {
  from { stroke-dashoffset: 1000; }
  to { stroke-dashoffset: 0; }
}
</style>
</head>
<body>

<!-- ══ SCENE 0: Face ID ══ -->
<div class="scene active" id="scene-faceid">
  <div class="faceid-ring">
    <svg class="faceid-icon" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="8" width="16" height="4" rx="2" fill="#556688"/>
      <rect x="8" y="8" width="4" height="16" rx="2" fill="#556688"/>
      <rect x="48" y="8" width="16" height="4" rx="2" fill="#556688"/>
      <rect x="60" y="8" width="4" height="16" rx="2" fill="#556688"/>
      <rect x="8" y="60" width="16" height="4" rx="2" fill="#556688"/>
      <rect x="8" y="48" width="4" height="16" rx="2" fill="#556688"/>
      <rect x="48" y="60" width="16" height="4" rx="2" fill="#556688"/>
      <rect x="60" y="48" width="4" height="16" rx="2" fill="#556688"/>
      <ellipse cx="27" cy="34" rx="3" ry="4" fill="#8899bb"/>
      <ellipse cx="45" cy="34" rx="3" ry="4" fill="#8899bb"/>
      <path d="M26 48 Q36 54 46 48" stroke="#8899bb" stroke-width="2.5" stroke-linecap="round" fill="none"/>

<!-- ══ SCENE 1: Writing ══ -->
<div class="scene" id="scene-writing">
  <div class="desk">
    <div class="paper-sheet" id="paper-sheet">
      <div class="paper-lines" id="paper-lines">
        <div class="paper-line"></div><div class="paper-line"></div>

      </div>
      <canvas class="writing-canvas" id="writing-canvas"></canvas>
    </div>
  </div>
</div>

<!-- ══ SCENE 2: Crumple ══ -->
<div class="scene" id="scene-crumple">
  <canvas id="crumple-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
</div>

<!-- ══ SCENE 3: Morph to plane ══ -->
<div class="scene" id="scene-morph">
  <canvas id="morph-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
</div>

<!-- ══ SCENE 4: Flight ══ -->
<div class="scene" id="scene-flight">
  <canvas id="flight-canvas"></canvas>
</div>

<!-- ══ SCENE 5: Tap plane ══ -->
<div class="scene" id="scene-tap">
  <div class="location-tag">📍 東京都新宿区 工学院大学</div>
  <svg id="plane-tap" width="160" height="120" viewBox="0 0 160 120"
       onclick="goToCard()" role="button" aria-label="點擊紙飛機展開信件">
    <!-- 3D paper plane -->

      </linearGradient>
      <linearGradient id="pg3" x1="0" y1="0" x2="1" y2="0">

    <!-- ruled lines hint -->
    <line x1="35" y1="62" x2="95" y2="52" stroke="rgba(100,130,200,0.2)" stroke-width="0.7"/>

<!-- ══ SCENE 6: Card ══ -->
<div class="scene" id="scene-card">
  <div class="card-wrap hidden" id="card-wrap">
    <div class="card-inner">
      <div class="card-face">
        <div class="card-ruled-lines">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>

        <div class="card-salutation">親愛的，生日快樂 🎂</div>

        <div class="card-sign" id="card-sign"></div>
      </div>
    </div>

<script>
// ── 卡片內容（改這裡）──
const CARD_CONTENT = {
  date: new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' }),
  body: `謝謝你出現在我的生命裡，
讓每一天都變得更有意義。

你努力學習、認真生活的樣子，
是我每天最想看見的風景。

在這特別的一天，
希望你的每個願望都能成真。

無論前方的路多遠，
我都會在你身邊。`,
  sign: '愛你的我 ♡'
};

// ── 場景控制 ──
let currentScene = 0;
const scenes = ['scene-faceid','scene-writing','scene-crumple','scene-morph','scene-flight','scene-tap','scene-card'];

function showScene(idx) {
  document.querySelectorAll('.scene').forEach((s,i) => {
    s.classList.toggle('active', i === idx);
  });
  currentScene = idx;
}

// ═══════════════════════════
//  FACE ID
// ═══════════════════════════
function bufferToBase64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let str = '';
  bytes.forEach(b => str += String.fromCharCode(b));
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function base64urlToBuffer(b64) {
  const base64 = b64.replace(/-/g,'+').replace(/_/g,'/');
  const str = atob(base64);
  const bytes = new Uint8Array(str.length);
  for (let i=0;i<str.length;i++) bytes[i]=str.charCodeAt(i);
  return bytes.buffer;
}

async function doFaceID() {
  const btn = document.getElementById('faceid-btn');
  const status = document.getElementById('faceid-status');
  btn.disabled = true;
  status.className = '';
  status.textContent = '正在驗證中…';

  try {
    if (!window.PublicKeyCredential) throw new Error('瀏覽器不支援 WebAuthn');

    const stored = JSON.parse(localStorage.getItem('registered_credentials') || '[]');
    let credential;

    if (stored.length === 0) {
      // 首次：註冊
      const challenge = new Uint8Array(32);
      crypto.getRandomValues(challenge);
      const userId = new Uint8Array(16);
      crypto.getRandomValues(userId);

      credential = await navigator.credentials.create({
        publicKey: {
          challenge,
          rp: { name: '給你的一封信' },
          user: { id: userId, name: 'user@letter', displayName: '使用者' },
          pubKeyCredParams: [{ alg:-7, type:'public-key' },{ alg:-257, type:'public-key' }],
          authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'required' },
          timeout: 60000
        }
      });
      const credId = bufferToBase64url(credential.rawId);
      localStorage.setItem('registered_credentials', JSON.stringify([{ id: credId }]));
      status.className = 'ok';
      status.textContent = '驗證成功 ✓';
    } else {
      // 之後：驗證
      const challenge = new Uint8Array(32);
      crypto.getRandomValues(challenge);
      credential = await navigator.credentials.get({
        publicKey: {
          challenge,
          allowCredentials: stored.map(c => ({ id: base64urlToBuffer(c.id), type:'public-key', transports:['internal'] })),
          userVerification: 'required',
          timeout: 60000
        }
      });
      status.className = 'ok';
      status.textContent = '驗證成功 ✓';
    }

    setTimeout(() => {
      showScene(1);
      startWriting();
    }, 800);

  } catch(err) {
    status.className = 'err';
    if (err.name === 'NotAllowedError') {
      status.textContent = '已取消，請再試一次';
    } else {
      status.textContent = err.message || '驗證失敗';
    }
    btn.disabled = false;
  }
}

// ═══════════════════════════
//  SCENE 1: 手寫動畫
// ═══════════════════════════
function startWriting() {
  const sheet = document.getElementById('paper-sheet');
  const canvas = document.getElementById('writing-canvas');
  canvas.width = sheet.offsetWidth;
  canvas.height = sheet.offsetHeight;
  const ctx = canvas.getContext('2d');

  // 寫字筆畫路徑（模擬中文筆畫）
  const strokes = [
    // 第一行：親愛的
    [[60,55],[75,55],[90,55],[100,55]],
    [[62,50],[62,65]],
    [[120,52],[135,52]],
    [[127,48],[127,68]],
    [[155,50],[170,50]],
    [[162,46],[162,70]],
    // 第二行：生日快樂
    [[60,88],[75,88]],
    [[67,82],[67,98]],
    [[95,84],[110,84]],
    [[102,80],[102,100]],
    [[130,82],[142,96]],
    [[156,80],[162,100]],
  ];

  let strokeIdx = 0;
  let pointIdx = 0;
  let drawing = false;

  ctx.strokeStyle = '#3a2a14';
  ctx.lineWidth = 1.8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  function drawNext() {
    if (strokeIdx >= strokes.length) {
      // 完成寫字，等一下進入揉紙場景
      setTimeout(startCrumple, 900);
      return;
    }
    const stroke = strokes[strokeIdx];
    if (pointIdx === 0) {
      ctx.beginPath();
      ctx.moveTo(stroke[0][0], stroke[0][1]);
      drawing = true;
    }
    if (pointIdx < stroke.length) {
      const p = stroke[pointIdx];
      ctx.lineTo(p[0], p[1]);
      ctx.stroke();
      pointIdx++;
      setTimeout(drawNext, 40 + Math.random()*30);
    } else {
      strokeIdx++;
      pointIdx = 0;
      drawing = false;
      setTimeout(drawNext, 80 + Math.random()*60);
    }
  }
  setTimeout(drawNext, 600);
}

// ═══════════════════════════
//  SCENE 2: 揉紙
// ═══════════════════════════
function startCrumple() {
  showScene(2);
  const canvas = document.getElementById('crumple-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  let t = 0;
  const duration = 90; // frames

  function frame() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const progress = t / duration;
    const eased = 1 - Math.pow(1 - progress, 3);

    // paper starts as rect, crumples to circle
    const startW = 260, startH = 340;
    const endR = 40;

    ctx.save();
    ctx.translate(cx, cy);

    if (progress < 0.7) {
      // phase 1: corners fold in
      const p = progress / 0.7;
      const w = startW * (1 - p * 0.5);
      const h = startH * (1 - p * 0.4);
      const crinkle = p * 15;

      // shadow
      ctx.shadowBlur = 20;
      ctx.shadowColor = 'rgba(0,0,0,0.5)';

      ctx.beginPath();
      // draw crinkled paper
      const pts = 24;
      for (let i = 0; i <= pts; i++) {
        const angle = (i / pts) * Math.PI * 2;
        const rx = w/2 + (Math.sin(angle * 3 + t*0.3) * crinkle);
        const ry = h/2 + (Math.cos(angle * 5 + t*0.2) * crinkle);
        const x = Math.cos(angle) * rx;
        const y = Math.sin(angle) * ry;
        if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();

      const grad = ctx.createRadialGradient(0,0,0,0,0,Math.max(w,h)/2);
      grad.addColorStop(0, '#fdf6e3');
      grad.addColorStop(0.7, '#e8d5a0');
      grad.addColorStop(1, '#c8b070');
      ctx.fillStyle = grad;
      ctx.fill();

      // ruled lines
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(100,130,200,0.2)';
      ctx.lineWidth = 0.8;
      for (let row = -3; row <= 3; row++) {
        const ly = row * 28 * (1-p*0.3);
        const lx = w/2 * (1-p*0.2);
        ctx.beginPath();
        ctx.moveTo(-lx, ly);
        ctx.lineTo(lx, ly);
        ctx.stroke();
      }

    } else {
      // phase 2: squish into ball
      const p = (progress - 0.7) / 0.3;
      const r = startW/2 * (1 - p * 0.7) + endR * p;

      ctx.shadowBlur = 20 + p * 10;
      ctx.shadowColor = 'rgba(0,0,0,0.6)';

      ctx.beginPath();
      const pts2 = 32;
      for (let i = 0; i <= pts2; i++) {
        const angle = (i / pts2) * Math.PI * 2;
        const jitter = (1 - p) * 12;
        const rx = r + Math.sin(angle * 7 + t*0.5) * jitter;
        const ry = r + Math.cos(angle * 5 + t*0.4) * jitter;
        const x = Math.cos(angle) * rx;
        const y = Math.sin(angle) * ry;
        if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();

      const grad2 = ctx.createRadialGradient(-r*0.3,-r*0.3,0,0,0,r);
      grad2.addColorStop(0, '#f0e8c8');
      grad2.addColorStop(0.5, '#d4bc85');
      grad2.addColorStop(1, '#a89060');
      ctx.fillStyle = grad2;
      ctx.fill();
    }

    ctx.restore();
    t++;

    if (t <= duration) {
      requestAnimationFrame(frame);
    } else {
      setTimeout(startMorph, 300);
    }
  }
  requestAnimationFrame(frame);
}

// ═══════════════════════════
//  SCENE 3: 紙球 → 紙飛機
// ═══════════════════════════
function startMorph() {
  showScene(3);
  const canvas = document.getElementById('morph-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  let t = 0;
  const dur = 80;

  // plane shape (normalized, centered at 0,0 facing right)
  function planePts(s) {
    return {
      body:  [[-s*1.2, 0],[s*1.2,-s*0.3],[s*0.2,s*0.1]],
      wing:  [[s*0.2,s*0.1],[s*1.2,-s*0.3],[s*1.4,s*0.5]],
      tail:  [[-s*1.2,0],[s*0.2,s*0.1],[-s*0.9,s*0.7]],
    };
  }

  function frame() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const p = Math.min(t/dur, 1);
    const eased = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;

    const ballR = 42 * (1 - eased);
    const planeScale = 100 * eased;

    ctx.save();
    ctx.translate(cx, cy);

    if (eased < 0.5) {
      // still mostly ball
      const r = ballR + 5;
      ctx.beginPath();
      const pts = 32;
      for (let i=0;i<=pts;i++) {
        const a = (i/pts)*Math.PI*2;
        const rx = r + Math.sin(a*7)*r*(0.5-eased)*0.3;
        const ry = r + Math.cos(a*5)*r*(0.5-eased)*0.3;
        const x = Math.cos(a)*rx, y = Math.sin(a)*ry;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();
      const g = ctx.createRadialGradient(-r*0.3,-r*0.3,0,0,0,r);
      g.addColorStop(0,'#f0e8c8'); g.addColorStop(1,'#a89060');
      ctx.fillStyle=g; ctx.fill();
    } else {
      // morphing to plane
      const s = planeScale;
      const pl = planePts(s/100);

      ctx.shadowBlur = 20; ctx.shadowColor='rgba(0,0,0,0.5)';

      // body
      ctx.beginPath();
      pl.body.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
      ctx.closePath();
      ctx.fillStyle='#fdf6e3'; ctx.fill();
      ctx.strokeStyle='#c8b070'; ctx.lineWidth=0.8; ctx.stroke();

      // wing
      ctx.beginPath();
      pl.wing.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
      ctx.closePath();
      ctx.fillStyle='#e8d5a0'; ctx.fill();
      ctx.stroke();

      // tail
      ctx.beginPath();
      pl.tail.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
      ctx.closePath();
      ctx.fillStyle='#d4bc85'; ctx.fill();
      ctx.stroke();
    }

    ctx.restore();
    t++;
    if (t <= dur + 20) requestAnimationFrame(frame);
    else setTimeout(startFlight, 400);
  }
  requestAnimationFrame(frame);
}

// ═══════════════════════════
//  SCENE 4: 飛行地圖
// ═══════════════════════════
function startFlight() {
  showScene(4);
  const canvas = document.getElementById('flight-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 座標（概略）
  // 台灣桃園機場：約 25.08N, 121.23E
  // 日本工學院大學：35.69N, 139.70E
  // 地圖範圍：lat 20~42, lon 118~145

  const MAP = { latMin:20, latMax:42, lonMin:115, lonMax:148 };
  function toXY(lat, lon) {
    const x = ((lon - MAP.lonMin) / (MAP.lonMax - MAP.lonMin)) * W;
    const y = (1 - (lat - MAP.latMin) / (MAP.latMax - MAP.latMin)) * H;
    return [x, y];
  }

  const taoyuan = toXY(25.08, 121.23);
  const kogakuin = toXY(35.69, 139.70);

  // bezier control point (arc over ocean)
  const ctrl = toXY(31, 130);

  function bezier(t, p0, p1, p2) {
    const mt = 1-t;
    return [
      mt*mt*p0[0] + 2*mt*t*p1[0] + t*t*p2[0],
      mt*mt*p0[1] + 2*mt*t*p1[1] + t*t*p2[1]
    ];
  }
  function bezierTangent(t, p0, p1, p2) {
    const mt = 1-t;
    return [
      2*mt*(p1[0]-p0[0]) + 2*t*(p2[0]-p1[0]),
      2*mt*(p1[1]-p0[1]) + 2*t*(p2[1]-p1[1])
    ];
  }

  // draw simple map
  function drawMap() {
    // ocean bg
    const oceanGrad = ctx.createLinearGradient(0,0,0,H);
    oceanGrad.addColorStop(0,'#0d1b2a');
    oceanGrad.addColorStop(1,'#0a2a3a');
    ctx.fillStyle = oceanGrad;
    ctx.fillRect(0,0,W,H);

    // grid lines
    ctx.strokeStyle = 'rgba(100,150,200,0.07)';
    ctx.lineWidth = 0.5;
    for (let lon=115; lon<=148; lon+=5) {
      const [x] = toXY(20, lon);
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for (let lat=20; lat<=42; lat+=5) {
      const [,y] = toXY(lat,115);
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }

    // simplified land masses
    // Taiwan
    ctx.beginPath();
    const tw = [
      toXY(25.3,121.6),toXY(25.0,121.9),toXY(24.3,121.8),
      toXY(23.5,121.5),toXY(22.5,120.8),toXY(22.0,120.5),
      toXY(22.6,120.3),toXY(23.5,120.2),toXY(24.5,120.8),
      toXY(25.1,121.4),toXY(25.3,121.6)
    ];
    tw.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.closePath();
    ctx.fillStyle='#1e3a2a'; ctx.fill();
    ctx.strokeStyle='rgba(100,200,150,0.3)'; ctx.lineWidth=0.8; ctx.stroke();

    // Japan (simplified Honshu)
    ctx.beginPath();
    const jp = [
      toXY(34.0,131.0),toXY(34.5,132.5),toXY(34.8,135.0),
      toXY(35.5,136.5),toXY(36.0,137.5),toXY(36.5,138.5),
      toXY(36.8,140.0),toXY(36.5,141.0),toXY(35.5,140.5),
      toXY(34.0,137.0),toXY(33.5,135.0),toXY(33.0,131.5),
      toXY(34.0,131.0)
    ];
    jp.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.closePath();
    ctx.fillStyle='#1e2e3a'; ctx.fill();
    ctx.strokeStyle='rgba(100,150,220,0.3)'; ctx.lineWidth=0.8; ctx.stroke();

    // Kyushu
    ctx.beginPath();
    const ky = [
      toXY(33.5,130.5),toXY(33.0,130.0),toXY(32.0,130.5),
      toXY(31.5,131.5),toXY(32.5,132.0),toXY(33.5,131.5),toXY(33.5,130.5)
    ];
    ky.forEach(([x,y],i) => i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.closePath();
    ctx.fillStyle='#1e2e3a'; ctx.fill();
    ctx.strokeStyle='rgba(100,150,220,0.3)'; ctx.lineWidth=0.8; ctx.stroke();

    // labels
    ctx.font = '11px -apple-system,sans-serif';
    ctx.fillStyle = 'rgba(180,210,200,0.6)';
    ctx.textAlign = 'center';
    const [twx,twy] = toXY(23.8,120.8);
    ctx.fillText('台灣', twx, twy);
    const [jpx,jpy] = toXY(35.2,137.5);
    ctx.fillText('日本', jpx, jpy);
  }

  let t = 0;
  const dur = 280;
  let trailPts = [];

  function frame() {
    ctx.clearRect(0,0,W,H);
    drawMap();

    const progress = Math.min(t/dur, 1);
    const eased = progress;

    // trail
    trailPts.push(bezier(eased, taoyuan, ctrl, kogakuin));
    if (trailPts.length > 1) {
      ctx.beginPath();
      ctx.moveTo(trailPts[0][0], trailPts[0][1]);
      trailPts.forEach(([x,y]) => ctx.lineTo(x,y));
      ctx.strokeStyle = 'rgba(220,200,120,0.5)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4,4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // origin dot
    ctx.beginPath();
    ctx.arc(taoyuan[0], taoyuan[1], 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,200,150,0.8)';
    ctx.fill();

    // destination dot (appears near end)
    if (progress > 0.9) {
      const a = (progress-0.9)/0.1;
      ctx.beginPath();
      ctx.arc(kogakuin[0], kogakuin[1], 6, 0, Math.PI*2);
      ctx.fillStyle = `rgba(220,180,100,${a*0.9})`;
      ctx.fill();
      // pulse ring
      ctx.beginPath();
      ctx.arc(kogakuin[0], kogakuin[1], 6 + a*14, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(220,180,100,${a*0.4})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // place labels
    ctx.font = '10px -apple-system,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(200,220,180,0.7)';
    ctx.fillText('✈ 桃園機場', taoyuan[0]+8, taoyuan[1]-4);
    if (progress > 0.85) {
      ctx.fillStyle = 'rgba(220,200,120,0.85)';
      ctx.fillText('工学院大学', kogakuin[0]+8, kogakuin[1]-4);
    }

    // plane
    const [px,py] = bezier(eased, taoyuan, ctrl, kogakuin);
    const [tx,ty] = bezierTangent(eased, taoyuan, ctrl, kogakuin);
    const angle = Math.atan2(ty,tx);

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(angle);
    const ps = 18;
    ctx.beginPath();
    ctx.moveTo(ps, 0);
    ctx.lineTo(-ps*0.6, -ps*0.5);
    ctx.lineTo(-ps*0.2, 0);
    ctx.lineTo(-ps*0.6, ps*0.5);
    ctx.closePath();
    ctx.fillStyle = '#fdf6e3';
    ctx.fill();
    ctx.strokeStyle = '#c8b070'; ctx.lineWidth=0.8; ctx.stroke();
    // wing
    ctx.beginPath();
    ctx.moveTo(-ps*0.1, 0); ctx.lineTo(ps*0.3, -ps*0.8); ctx.lineTo(ps*0.5,-ps*0.2);
    ctx.closePath(); ctx.fillStyle='#e8d5a0'; ctx.fill();
    ctx.restore();

    t++;
    if (t <= dur) {
      requestAnimationFrame(frame);
    } else {
      setTimeout(() => showScene(5), 600);
    }
  }
  requestAnimationFrame(frame);
}

// ═══════════════════════════
//  SCENE 6: 展開卡片
// ═══════════════════════════
function goToCard() {
  showScene(6);
  const wrap = document.getElementById('card-wrap');
  document.getElementById('card-date').textContent = CARD_CONTENT.date;
  wrap.classList.remove('hidden');
  wrap.classList.add('reveal');
  setTimeout(() => typeCardText(), 800);
}

function typeCardText() {
  const el = document.getElementById('card-body-text');
  const sign = document.getElementById('card-sign');
  const text = CARD_CONTENT.body;
  let i = 0;

  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  el.appendChild(cursor);

  function type() {
    if (i < text.length) {
      cursor.before(document.createTextNode(text[i]));
      i++;
      setTimeout(type, text[i-1]==='\n' ? 200 : 60 + Math.random()*40);
    } else {
      cursor.remove();
      setTimeout(() => {
        sign.textContent = CARD_CONTENT.sign;
        sign.style.animation = 'cardReveal 0.8s ease forwards';
      }, 400);
    }
  }
  type();
}

// ── 視窗大小變更時重設 canvas ──
window.addEventListener('resize', () => {
  // 只在飛行場景時重繪
  if (currentScene === 4) startFlight();
});
</script>
