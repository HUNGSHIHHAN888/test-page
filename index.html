<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>裝置驗證測試</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #1a1a1a;
    border: 0.5px solid #2e2e2e;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .icon-wrap {
    width: 72px;
    height: 72px;
    background: #222;
    border: 0.5px solid #333;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }

  .icon-wrap svg {
    width: 36px;
    height: 36px;
    stroke: #a0a0a0;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #f0f0f0;
    margin-bottom: 0.5rem;
    letter-spacing: -0.3px;
  }

  .subtitle {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .status-box {
    background: #111;
    border: 0.5px solid #2a2a2a;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1.5rem;
    font-size: 13px;
    color: #555;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s;
  }

  .status-box.success {
    border-color: #1a3a2a;
    background: #0d1f18;
    color: #4caf7d;
  }

  .status-box.error {
    border-color: #3a1a1a;
    background: #1f0d0d;
    color: #e05c5c;
  }

  .status-box.loading {
    border-color: #2a2a3a;
    background: #111120;
    color: #7878cc;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: -0.2px;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: #f0f0f0;
    color: #0f0f0f;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.88; }

  .note {
    font-size: 12px;
    color: #444;
    margin-top: 1.25rem;
    line-height: 1.6;
  }

  .pulse {
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .check-icon {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a5 5 0 0 1 5 5v3H7V7a5 5 0 0 1 5-5z"/>
      <rect x="3" y="10" width="18" height="12" rx="3"/>
      <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
  </div>

  <h1>裝置安全驗證</h1>
  <p class="subtitle">這是一個生物辨識登入功能的測試頁面。<br>請點下方按鈕，用 Face ID 完成驗證。</p>

  <div class="status-box" id="status">
    <span class="dot"></span>
    <span id="status-text">等待驗證</span>
  </div>

  <button class="btn btn-primary" id="registerBtn" onclick="startRegister()">
    啟動 Face ID 驗證
  </button>

  <p class="note">此頁面不會收集任何個人資料。<br>臉部資訊僅存於你的裝置，不會上傳。</p>
</div>

<script>
function setStatus(type, text) {
  const box = document.getElementById('status');
  const label = document.getElementById('status-text');
  box.className = 'status-box ' + type;
  label.textContent = text;

  const dot = box.querySelector('.dot');
  if (dot) {
    if (type === 'loading') {
      dot.classList.add('pulse');
    } else {
      dot.classList.remove('pulse');
    }
  }
}

function bufferToBase64url(buffer) {
  const bytes = new Uint8Array(buffer);
  let str = '';
  bytes.forEach(b => str += String.fromCharCode(b));
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function base64urlToBuffer(base64url) {
  const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
  const str = atob(base64);
  const bytes = new Uint8Array(str.length);
  for (let i = 0; i < str.length; i++) bytes[i] = str.charCodeAt(i);
  return bytes.buffer;
}

function generateChallenge() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return arr;
}

async function startRegister() {
  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  setStatus('loading', '正在呼叫 Face ID…');

  try {
    if (!window.PublicKeyCredential) {
      throw new Error('此瀏覽器不支援 WebAuthn');
    }

    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if (!available) {
      throw new Error('此裝置沒有生物辨識功能');
    }

    const challenge = generateChallenge();
    const userId = new Uint8Array(16);
    crypto.getRandomValues(userId);

    const credential = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: '驗證測試' },
        user: {
          id: userId,
          name: 'user@test',
          displayName: '測試使用者',
        },
        pubKeyCredParams: [
          { alg: -7, type: 'public-key' },
          { alg: -257, type: 'public-key' },
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
        },
        timeout: 60000,
      }
    });

    const credentialId = bufferToBase64url(credential.rawId);

    const stored = JSON.parse(localStorage.getItem('registered_credentials') || '[]');
    stored.push({
      id: credentialId,
      registeredAt: new Date().toISOString(),
    });
    localStorage.setItem('registered_credentials', JSON.stringify(stored));

    setStatus('success', '✓ 驗證成功，裝置已登錄');
    btn.textContent = '再次驗證';
    btn.disabled = false;
    btn.onclick = startAuthenticate;

  } catch (err) {
    if (err.name === 'NotAllowedError') {
      setStatus('error', '已取消或逾時');
    } else {
      setStatus('error', err.message || '驗證失敗');
    }
    btn.disabled = false;
  }
}

async function startAuthenticate() {
  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  setStatus('loading', '正在驗證身份…');

  try {
    const stored = JSON.parse(localStorage.getItem('registered_credentials') || '[]');
    if (stored.length === 0) {
      throw new Error('尚未登錄任何裝置');
    }

    const challenge = generateChallenge();

    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: stored.map(c => ({
          id: base64urlToBuffer(c.id),
          type: 'public-key',
          transports: ['internal'],
        })),
        userVerification: 'required',
        timeout: 60000,
      }
    });

    setStatus('success', '✓ 身份驗證通過');
    btn.textContent = '再次驗證';
    btn.disabled = false;

  } catch (err) {
    if (err.name === 'NotAllowedError') {
      setStatus('error', '已取消或逾時');
    } else {
      setStatus('error', err.message || '驗證失敗');
    }
    btn.disabled = false;
  }
}

(async () => {
  const stored = JSON.parse(localStorage.getItem('registered_credentials') || '[]');
  if (stored.length > 0) {
    document.getElementById('registerBtn').textContent = '再次驗證';
    document.getElementById('registerBtn').onclick = startAuthenticate;
  }
})();
</script>

</body>
</html>
